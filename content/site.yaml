sections:
  - id: papers
    classes:
      - section-lead
    eyebrow: Perturbation metrics
    title: Class-dependent evaluation effects
    description: >-
      Perturbation analysis is often used to evaluate how "correct" explanations are. 
      In the below projects, we studied when that evaluation depends on the predicted class, 
      and what that means for trusting the perturbation metrics.
      Here, we applied evaluation metrics to feature attribution explanations, 
      which compute importance scores to input features (time points) for a specific prediction.
    projects:
      - slug: class-dependent-perturbation-effects
        classes:
          - project-featured
        tag: Paper 1
        title: Class-dependent perturbation effects in evaluating time-series attributions
        takeaway: >-
          Takeaway: Perturbation-based evaluation metrics can behave very differently
          across classes, even for the same dataset and model. This implies strong
          aggregate scores can reflect class-specific model behavior rather than better
          attribution quality.
        body:
          - >-
            The paper evaluates feature attribution explanation methods across datasets, model
            architectures, and perturbation strategies in the context of time series classification. 
            It finds that perturbation metrics can be sensitive for some classes and much less sensitive for others,
            with the strongest perturbation strategies often showing the largest class differences.
        citation: >-
          Baer, G., Grau, I., Zhang, C., Van Gorp, P. (2025). Class-Dependent Perturbation Effects in Evaluating Time Series Attributions. In: Guidotti, R., Schmid, U., Longo, L. (eds) Explainable Artificial Intelligence. xAI 2025. Communications in Computer and Information Science, vol 2579. Springer, Cham. https://doi.org/10.1007/978-3-032-08330-2_14
        links:
          - label: DOI
            href: https://doi.org/10.1007/978-3-032-08330-2_14
            style: primary
          - label: arXiv
            href: https://arxiv.org/abs/2502.17022
            style: secondary
        figures:
          - src: assets/class-dependent-perturbation-effects/fig1_class-dependent-perturbation-effects.png
            alt: Schematic of perturbing the most relevant parts of a time series.
            caption: You can computationally evaluate explanations with perturbation by replacing input data points in the order of most (or least) important features, and seeing how the predictions change.
          - src: assets/class-dependent-perturbation-effects/fig2_cd_distribution.png
            alt: Distributions of perturbation metric for different attribution methods, showing class-dependent effects.
            caption: The distributions of computational evaluation metrics show clear differences per class across different attribution methods.
          - src: assets/class-dependent-perturbation-effects/fig3_pcoords_cd_constant_perturbations.png
            alt: Class-stratified analysis of perturbation metrics for different perturbation strategies with different constant perturbations.
            caption: Perturbing with different constant values leads to different class-dependent effects for the same prediction model and attribution method.
          - src: assets/class-dependent-perturbation-effects/fig4_pcoords_cd_named_perturbations.png
            alt: Class-stratified analysis of perturbation metrics for different perturbation strategies with different named perturbations.
            caption: Perturbing with different perturbation strategies (like Gaussian vs. Uniform noise) also leads to different class-dependent effects for the same prediction model and attribution method.

      - slug: why-class-dependent-effects
        classes:
          - project-featured
          - project-reverse
        tag: Paper 2
        title: Why do class-dependent evaluation effects occur?
        takeaway: >-
          Takeaway: Class-dependent evaluation effects can come from simple differences
          between class features, such as amplitude or duration. Additionally,
          perturbation metrics can disagree with ground-truth metrics, 
          so you may want to be careful in making comparisons.
        body:
          - >-
            The paper uses synthetic time series with known relevant feature locations to
            study when class-dependent evaluation effects occur. By varying feature types
            and class contrasts, it shows that these effects can appear even in simple
            controlled settings.
          - >-
            The results show that perturbation-based evaluation metrics and
            ground-truth-based metrics often provide different views of
            attribution quality across classes.
        citation: >-
          Baer, G., Grau, I., Zhang, C., Van Gorp, P. (2026). Why do Class-Dependent Evaluation Effects Occur with Time Series Feature Attributions? A Synthetic Data Investigation. In: Koprinska, I., Mendes-Moreira, J., Branco, P. (eds) Machine Learning and Principles and Practice of Knowledge Discovery in Databases. ECML PKDD 2025. Communications in Computer and Information Science, vol 2842. Springer, Cham. https://doi.org/10.1007/978-3-032-19105-2_27
        links:
          - label: DOI
            href: https://doi.org/10.1007/978-3-032-19105-2_27
            style: primary
          - label: arXiv
            href: https://arxiv.org/abs/2506.11790
            style: secondary
        figures:
          - src: assets/why-class-dependent-effects/fig1_cdpe-why-schematic.png
            alt: Study setup comparing perturbation metrics and ground-truth metrics between classes.
            caption: Study setup comparing perturbation metrics and ground-truth metrics between classes.
          - src: assets/why-class-dependent-effects/fig2_avg_metrics.png
            alt: Average perturbation and ground-truth metrics for different datasets, showing class-dependent effects.
            caption: Comparing the average perturbation and ground-truth metrics for different datasets shows that class-dependent effects can occur in both, but class-dependent effects seem to be reversed.
          - src: assets/why-class-dependent-effects/fig3_metric_correlations.png
            alt: Correlation between perturbation and ground-truth metrics for different classes and datasets.
            caption: Weak correlations and sign reversals between classes across datasets show that ground truth and perturbation-based metrics can disagree about attribution quality.

  - id: metrics
    eyebrow: Human-centric evaluation
    title: Computational metrics and human understanding
    description: >-
      A computational evaluation metric is useful only if we know what it tells us. This
      project studies how computational explanation correctness relates to whether people can
      understand AI decision patterns.
    projects:
      - slug: explanation-correctness
        classes:
          - project-single
        tag: User study
        title: Linking Computational XAI Evaluation to Human Understanding
        takeaway: >-
          Takeaway: Explanation correctness can affect human understanding, but the relationship is not always straightforward. 
          Incorrect explanations can hurt understanding, while correct ones do not guarantee that 
          people learn (and understand) the model's decision pattern.
        body:
          - >-
            In a user study, participants used explanations to predict an AI system's
            decisions in a time-series classification task. 
            This task is called forward simulation and can be seen as a proxy measure for understanding. 
            The study controlled explanation correctness at four levels and found that understanding dropped
            at 70% and 55% correctness compared with fully correct explanations, but did
            not keep dropping below 70%. 
            100% and 85% correct explanations are statistically indistinguishable in terms of forward simulation accuracy.
          - >-
            The results suggest that computational XAI evaluation metrics should not be treated as
            direct proxies for human understanding. Correctness can help, but people
            differ in whether they learn from explanations, and self-reported
            understanding does not always match actual task performance.
        citation: >-
          Baer, G., Zhang, C., Grau, I., & Van Gorp, P. (2026). 
          Does Explanation Correctness Matter? 
          Linking Computational XAI Evaluation to Human Understanding. 
          https://arxiv.org/abs/2603.25251v1
        links:
          - label: DOI
            href: https://doi.org/10.48550/arXiv.2603.25251
            style: primary
          - label: arXiv
            href: https://arxiv.org/abs/2603.25251
            style: secondary
        figures:
          - src: assets/explanation-correctness/fig1_study-design-correctness-understanding.png
            alt: User study design with training, testing, and survey phases.
            caption: The user study links explanation correctness to participant understanding by making participants directly predict the AI's decision based on the explanations (forward simulation).
          - src: assets/explanation-correctness/fig2_forward_sim_accuracy.png
            alt: Distribution of forward simulation accuracy for different explanation correctness levels.
            caption: Forward simulation accuracy (our proxy measure for human understanding) on average decreases with lower explanation correctness, but the effects are not straightforward or always significant (see paper results for more details).
          - src: assets/explanation-correctness/fig3_learning_curves_ci.png
            alt: "Learning curves: Cumulative forward simulation accuracy across training trials by correctness condition, averaged over participants."
            caption: Learning curves show that participants in the 100% correct condition become more accurate over time in training. For the other conditions, learning is slower and stays closer to chance performance.
          - src: assets/explanation-correctness/fig4_explanation_ratings.png
            alt: Subjective ratings of explanation quality across correctness conditions.
            caption: We also measured subjective ratings of explanation quality.
          - src: assets/explanation-correctness/fig5_corr_ess_avg.png
            alt: Correlation between explanation quality and understanding.
            caption: Objective understanding (measured with our proxy of forward simulation accuracy) and subjective ratings of explanation quality do not show a strong correlation, suggesting they may measure different things.

  - id: tool
    eyebrow: Synthetic data
    title: Tools for controlled evaluation
    description: >-
      xaitimesynth is a small Python package for synthetic time-series XAI evaluation. It
      creates datasets with known feature locations, so attribution methods can be
      tested in controlled and reproducible settings.
    projects:
      - slug: xaitimesynth
        figure_display: stack
        classes:
          - tool-project
        tag: Package
        title: "xaitimesynth: A Python Package for Evaluating Attribution Methods"
        takeaway: >-
          Takeaway: xaitimesynth makes it easier to evaluate time-series attribution
          methods with synthetic ground truth, instead of rebuilding custom data
          generators for each study.
        body:
          - >-
            The package generates univariate and multivariate time series by combining a
            background signal with localized, class-discriminating features. It tracks
            the feature locations as ground-truth masks, which can then be used to test
            whether attribution methods highlight the right time points.
          - >-
            It supports flexible dataset definitions through a fluent Python API with method chaining
            and YAML configuration files, and includes standard localization metrics such as
            AUC-PR, AUC-ROC, Relevance Mass Accuracy, and Relevance Rank Accuracy.
        links:
          - label: Documentation
            href: https://gregorbaer.github.io/xaitimesynth/
            style: primary
          - label: GitHub
            href: https://github.com/gregorbaer/xaitimesynth
            style: secondary
          - label: arXiv
            href: https://arxiv.org/abs/2603.06781
            style: secondary
        figures:
          - src: https://raw.githubusercontent.com/gregorbaer/xaitimesynth/main/docs/assets/logo/xaitimesynth_logo.svg
            alt: xaitimesynth logo
            caption: The xaitimesynth package provides controlled synthetic data for time-series XAI evaluation.
          - src: https://raw.githubusercontent.com/gregorbaer/xaitimesynth/main/docs/assets/images/quickstart_dataset.png
            alt: Example synthetic time-series dataset generated with xaitimesynth.
            caption: Example time series generated with the package quickstart.

